<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Explore</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; background: #101010;
  font-family: -apple-system, 'SF Pro Display', sans-serif;
  color: #F0F0F0; overflow: hidden;
}
#map { position: absolute; top: 0; left: 0; right: 0; bottom: 148px; }
#fog-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 400; }
.leaflet-control-zoom { display: none !important; }
.leaflet-control-attribution { font-size: 9px !important; opacity: 0.35; }
#hud {
  position: absolute; top: 14px; left: 14px; z-index: 500;
  background: #101010; border: 1px solid rgba(255,255,255,0.10); border-radius: 12px;
  padding: 10px 14px; display: flex; gap: 14px; align-items: flex-start;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 44px; }
.stat-lbl { font-size: 10px; color: #808080; letter-spacing: 0.02em; }
.stat-val { font-size: 15px; font-weight: 700; color: #F0F0F0; }
.stat-val.good { color: #00E080; }
.stat-val.warn { color: #F0A000; }
.stat-val.bad  { color: #E03020; }
#follow-btn {
  position: absolute; top: 14px; right: 14px; z-index: 500;
  background: #202020; border: 1px solid rgba(255,255,255,0.20); border-radius: 10px;
  padding: 9px 0; width: 100px; text-align: center;
  font-size: 13px; font-weight: 600; color: #F0F0F0; cursor: pointer; display: none;
}
#follow-btn.active { border-color: #00A0E0; background: #00A0E0; }
#bottom {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 500;
  background: #101010; border-top: 1px solid rgba(255,255,255,0.08);
  padding: 12px 14px 30px; display: flex; flex-direction: column; gap: 8px;
}
#main-btn {
  width: 100%; padding: 17px; border: none; border-radius: 10px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  background: #00A0E0; color: #F0F0F0; transition: background 0.15s;
}
#main-btn.tracking { background: #E03020; }
#main-btn:disabled { opacity: 0.35; cursor: default; }
#sec-row { display: flex; gap: 8px; }
.sec-btn {
  flex: 1; padding: 13px 0; background: #202020;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
  font-size: 14px; font-weight: 600; color: #A0A0A0; cursor: pointer; text-align: center;
}
.sec-btn.active { background: #00A0E0; border-color: #00A0E0; color: #F0F0F0; }
#menu-overlay {
  position: absolute; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.72); backdrop-filter: blur(8px);
  display: none; align-items: flex-end; justify-content: center;
}
#menu-overlay.open { display: flex; }
#menu-panel {
  width: 100%; background: #181818; border-top: 1px solid rgba(255,255,255,0.10);
  border-radius: 20px 20px 0 0; padding: 18px 16px 40px;
  display: flex; flex-direction: column; gap: 10px;
}
.menu-btn {
  width: 100%; padding: 16px; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  background: #202020; color: #D0D0D0; text-align: center;
}
.menu-btn.danger { color: #E03020; }
.menu-btn.back   { background: #00A0E0; color: #F0F0F0; }
#rotate-overlay {
  display: none; position: fixed; inset: 0; z-index: 99999;
  background: #101010; align-items: center; justify-content: center;
  color: #606060; font-size: 16px; font-weight: 600;
}
</style>
</head>
<body>
<div id="rotate-overlay">Rotate to portrait</div>
<div id="map"></div>
<canvas id="fog-canvas"></canvas>

<div id="hud">
  <div class="stat"><span class="stat-lbl">Hexagons</span><span class="stat-val" id="s-hexes">0</span></div>
  <div class="stat"><span class="stat-lbl">Area</span><span class="stat-val" id="s-area">0 m²</span></div>
  <div class="stat" id="s-acc-wrap" style="display:none">
    <span class="stat-lbl">Accuracy</span><span class="stat-val" id="s-acc">—</span>
  </div>
</div>

<button id="follow-btn" onclick="toggleFollow()">Follow</button>

<div id="bottom">
  <button id="main-btn" onclick="toggleTracking()">Use location</button>
  <div id="sec-row">
    <button class="sec-btn" id="menu-btn" onclick="menuBtnAction()">Menu</button>
    <button class="sec-btn" id="select-btn" onclick="selectBtnAction()">Select</button>
  </div>
</div>

<div id="menu-overlay" onclick="onOverlayClick(event)">
  <div id="menu-panel">
    <button class="menu-btn back"   onclick="closeMenu()">Back</button>
    <button class="menu-btn"        onclick="menuSave()">Save</button>
    <label  class="menu-btn">Load<input type="file" accept=".json" onchange="menuLoad(event)" style="display:none"></label>
    <button class="menu-btn" id="units-btn" onclick="toggleUnits()">Use imperial units</button>
    <button class="menu-btn danger" onclick="menuClear()">Clear data</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── Orientation lock ──────────────────────────────────────────────────────────
function checkOrientation() {
  document.getElementById('rotate-overlay').style.display =
    window.innerWidth > window.innerHeight ? 'flex' : 'none';
}
window.addEventListener('resize', checkOrientation);
checkOrientation();

// ── Constants ─────────────────────────────────────────────────────────────────
// Flat-top hex (pointy left/right). Point-to-point width = 100m → radius = 50m.
const HEX_R_M        = 50;          // center-to-corner metres
const SQRT3          = Math.sqrt(3);
const HEX_AREA_M2    = 1.5 * SQRT3 * HEX_R_M * HEX_R_M; // ≈ 6495 m²
const M_PER_DEG_LAT  = 111320;
const FOG_OUTER      = 0.90;
const FOG_MID        = 0.50;
const MAX_ACCURACY_M = 100;
const DEFAULT_ZOOM   = 16;
const STORAGE_KEY    = 'explore_hex_v1';

// ── Hex math ──────────────────────────────────────────────────────────────────
// Axial coordinates (q, r) for a flat-top grid.
// Center of (q,r) in metres from origin:
//   x = R * 1.5 * q
//   y = R * √3 * (r + q/2)

function mPerDegLng(lat) {
  return M_PER_DEG_LAT * Math.cos(lat * Math.PI / 180);
}

// Geographic origin for the grid — fixed so the grid is globally consistent
const OLat = 0, OLng = 0;

function hexCenter(q, r) {
  // Returns {lat, lng} of hex center
  const xM = HEX_R_M * 1.5 * q;
  const yM = HEX_R_M * SQRT3 * (r + q / 2);
  return {
    lat: OLat + yM / M_PER_DEG_LAT,
    lng: OLng + xM / mPerDegLng(OLat),
  };
}

function latLngToHex(lat, lng) {
  const xM = (lng - OLng) * mPerDegLng(OLat);
  const yM = (lat - OLat) * M_PER_DEG_LAT;
  const q  = xM / (HEX_R_M * 1.5);
  const r  = yM / (HEX_R_M * SQRT3) - q / 2;
  return hexRound(q, r);
}

function hexRound(q, r) {
  const s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
  if (dq > dr && dq > ds) rq = -rr - rs;
  else if (dr > ds)        rr = -rq - rs;
  return { q: rq, r: rr };
}

const HEX_DIRS = [
  {q:1,r:0},{q:1,r:-1},{q:0,r:-1},{q:-1,r:0},{q:-1,r:1},{q:0,r:1}
];

function hexNeighbours(q, r) {
  return HEX_DIRS.map(d => ({ q: q + d.q, r: r + d.r }));
}

function hexKey(q, r) { return `${q},${r}`; }

// Return the 6 pixel corners of hex (q,r) on the current map canvas
function hexPixelCorners(q, r) {
  const c = hexCenter(q, r);
  const cp = map.latLngToContainerPoint([c.lat, c.lng]);
  // Pixel radius: convert HEX_R_M to pixels via a reference point
  const ref = map.latLngToContainerPoint([
    c.lat + HEX_R_M / M_PER_DEG_LAT, c.lng
  ]);
  const rPx = Math.abs(cp.y - ref.y);
  const corners = [];
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 180) * (60 * i); // 0°,60°,...,300° for flat-top
    corners.push({ x: cp.x + rPx * Math.cos(angle), y: cp.y - rPx * Math.sin(angle) });
  }
  return corners;
}

// ── State ─────────────────────────────────────────────────────────────────────
let visitedKeys  = new Set();
let trackingActive = false;
let gpsWatchId   = null;
let lastKnownPos = null;
let followEnabled = false;
let selectMode   = false;
let metric       = true;
let posMarker    = null;

// ── Persist ───────────────────────────────────────────────────────────────────
(function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (d.visited) visitedKeys = new Set(d.visited);
    if (d.metric !== undefined) metric = d.metric;
  } catch(e) {}
})();

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ visited: [...visitedKeys], metric }));
  } catch(e) {}
}

// ── Map ───────────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [40,-20], zoom: 3, zoomControl: false, attributionControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',    { maxZoom: 19 }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { maxZoom: 19, pane: 'shadowPane' }).addTo(map);

map.on('dragstart', () => { if (!selectMode) setFollow(false); });
map.on('move zoom resize viewreset', drawFog);
map.on('click', onMapClick);

// ── Canvas fog ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('fog-canvas');
const ctx    = canvas.getContext('2d');

function syncCanvas() {
  const r = document.getElementById('map').getBoundingClientRect();
  canvas.width  = r.width;
  canvas.height = r.height;
  canvas.style.cssText =
    `position:absolute;top:${r.top}px;left:${r.left}px;` +
    `width:${r.width}px;height:${r.height}px;pointer-events:none;z-index:400`;
}

function drawHexPath(corners) {
  ctx.beginPath();
  ctx.moveTo(corners[0].x, corners[0].y);
  for (let i = 1; i < 6; i++) ctx.lineTo(corners[i].x, corners[i].y);
  ctx.closePath();
}

function drawFog() {
  syncCanvas();
  const w = canvas.width, h = canvas.height;

  // 1. Fill entire canvas with outer fog
  const outerOpacity = selectMode ? FOG_MID : FOG_OUTER;
  ctx.fillStyle = `rgba(14,14,14,${outerOpacity})`;
  ctx.fillRect(0, 0, w, h);

  if (visitedKeys.size === 0) return;

  // Build the set of adjacent (mid-fog) hexes
  const adjKeys = new Set();
  for (const key of visitedKeys) {
    const [q, r] = key.split(',').map(Number);
    for (const n of hexNeighbours(q, r)) {
      const nk = hexKey(n.q, n.r);
      if (!visitedKeys.has(nk)) adjKeys.add(nk);
    }
  }

  // 2. Determine which hexes are in (or near) the viewport
  const pad = map.getBounds().pad(0.5);

  // 3. Paint mid-fog over adjacent hexes (destination-out won't work directly,
  //    so we use a two-pass approach on an offscreen canvas)
  const off = new OffscreenCanvas(w, h);
  const octx = off.getContext('2d');

  // Start offscreen with outer fog
  octx.fillStyle = `rgba(14,14,14,${outerOpacity})`;
  octx.fillRect(0, 0, w, h);

  // Paint mid-fog hexes (adjacent)
  if (!selectMode) {
    octx.fillStyle = `rgba(14,14,14,${FOG_MID})`;
    for (const key of adjKeys) {
      const [q, r] = key.split(',').map(Number);
      const c = hexCenter(q, r);
      if (!pad.contains([c.lat, c.lng])) continue;
      const corners = hexPixelCorners(q, r);
      octx.beginPath();
      octx.moveTo(corners[0].x, corners[0].y);
      for (let i = 1; i < 6; i++) octx.lineTo(corners[i].x, corners[i].y);
      octx.closePath();
      octx.fill();
    }
  }

  // Punch visited hexes fully clear
  octx.globalCompositeOperation = 'destination-out';
  octx.fillStyle = 'rgba(0,0,0,1)';
  for (const key of visitedKeys) {
    const [q, r] = key.split(',').map(Number);
    const c = hexCenter(q, r);
    if (!pad.contains([c.lat, c.lng])) continue;
    const corners = hexPixelCorners(q, r);
    octx.beginPath();
    octx.moveTo(corners[0].x, corners[0].y);
    for (let i = 1; i < 6; i++) octx.lineTo(corners[i].x, corners[i].y);
    octx.closePath();
    octx.fill();
  }

  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(off, 0, 0);
}

// ── GPS ───────────────────────────────────────────────────────────────────────
function toggleTracking() { trackingActive ? stopTracking() : startTracking(); }

function startTracking() {
  if (!navigator.geolocation) return;
  trackingActive = true;
  followEnabled  = false;
  syncFollowBtn();
  updateUI();
  gpsWatchId = navigator.geolocation.watchPosition(onPosition, onGpsError,
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
}

function stopTracking() {
  if (gpsWatchId != null) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  trackingActive = false;
  followEnabled  = false;
  lastKnownPos   = null;
  if (posMarker) { map.removeLayer(posMarker); posMarker = null; }
  document.getElementById('s-acc-wrap').style.display = 'none';
  document.getElementById('follow-btn').style.display = 'none';
  save(); updateUI(); drawFog();
}

function onPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy: acc } = pos.coords;

  const el = document.getElementById('s-acc');
  el.textContent = metric ? `±${Math.round(acc)} m` : `±${Math.round(acc*3.281)} ft`;
  el.className   = 'stat-val ' + (acc < 50 ? 'good' : acc < 100 ? 'warn' : 'bad');
  document.getElementById('s-acc-wrap').style.display = 'flex';

  lastKnownPos = { lat, lng };
  updateBlueDot(lat, lng);
  if (followEnabled) map.setView([lat, lng], map.getZoom(), { animate: true, duration: 0.5 });

  if (acc >= MAX_ACCURACY_M) return;

  const { q, r } = latLngToHex(lat, lng);
  const key = hexKey(q, r);
  if (!visitedKeys.has(key)) {
    visitedKeys.add(key);
    save(); updateStats(); drawFog();
  }
}

function onGpsError() { stopTracking(); }

function updateBlueDot(lat, lng) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:#00A0E0;border:3px solid #F0F0F0;box-shadow:0 0 0 4px rgba(0,160,224,0.25)"></div>`,
    iconAnchor: [7,7],
  });
  if (posMarker) posMarker.setLatLng([lat, lng]);
  else posMarker = L.marker([lat, lng], { icon, zIndexOffset: 2000 }).addTo(map);
}

// ── Select mode ───────────────────────────────────────────────────────────────
function selectBtnAction() {
  selectMode = !selectMode;
  updateUI();
  drawFog();
}

function onMapClick(e) {
  if (!selectMode) return;
  const { q, r } = latLngToHex(e.latlng.lat, e.latlng.lng);
  const key = hexKey(q, r);
  if (visitedKeys.has(key)) visitedKeys.delete(key);
  else visitedKeys.add(key);
  save(); updateStats(); drawFog();
}

// ── Menu ──────────────────────────────────────────────────────────────────────
function menuBtnAction() { openMenu(); }

function openMenu() {
  document.getElementById('units-btn').textContent =
    metric ? 'Use imperial units' : 'Use metric units';
  document.getElementById('menu-overlay').classList.add('open');
}
function closeMenu() { document.getElementById('menu-overlay').classList.remove('open'); }
function onOverlayClick(e) {
  if (e.target === document.getElementById('menu-overlay')) closeMenu();
}
function menuSave() {
  closeMenu();
  const blob = new Blob([JSON.stringify({ version: 1, visited: [...visitedKeys] })],
    { type: 'application/json' });
  Object.assign(document.createElement('a'),
    { href: URL.createObjectURL(blob), download: 'explore-data.json' }).click();
}
function menuLoad(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.visited) { visitedKeys = new Set(d.visited); save(); updateStats(); drawFog(); }
    } catch(err) {}
  };
  reader.readAsText(file);
  e.target.value = '';
  closeMenu();
}
function toggleUnits() {
  metric = !metric;
  document.getElementById('units-btn').textContent =
    metric ? 'Use imperial units' : 'Use metric units';
  save(); updateStats();
}
function menuClear() {
  if (!confirm('Clear all data?')) return;
  if (trackingActive) stopTracking();
  selectMode = false;
  visitedKeys.clear();
  save(); updateUI(); updateStats(); drawFog();
  closeMenu();
}

// ── Follow ────────────────────────────────────────────────────────────────────
function syncFollowBtn() {
  const btn = document.getElementById('follow-btn');
  btn.textContent = followEnabled ? 'Following' : 'Follow';
  btn.classList.toggle('active', followEnabled);
}
function setFollow(val) {
  followEnabled = val;
  syncFollowBtn();
  if (val && lastKnownPos)
    map.setView([lastKnownPos.lat, lastKnownPos.lng], DEFAULT_ZOOM, { animate: true, duration: 0.5 });
}
function toggleFollow() { setFollow(!followEnabled); }

// ── UI ────────────────────────────────────────────────────────────────────────
function updateUI() {
  const mainBtn = document.getElementById('main-btn');
  mainBtn.textContent = trackingActive ? 'Stop tracking' : 'Use location';
  mainBtn.className   = trackingActive ? 'tracking' : '';

  const selBtn = document.getElementById('select-btn');
  selBtn.textContent = selectMode ? 'Done' : 'Select';
  selBtn.classList.toggle('active', selectMode);

  document.getElementById('follow-btn').style.display = trackingActive ? 'block' : 'none';
  syncFollowBtn();
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-hexes').textContent = visitedKeys.size.toLocaleString();
  const sqm = visitedKeys.size * HEX_AREA_M2;
  document.getElementById('s-area').textContent = fmtArea(sqm);
}

function fmtArea(sqm) {
  if (metric) {
    if (sqm >= 1e6) return `${(sqm/1e6).toFixed(2)} km²`;
    if (sqm >= 1e4) return `${(sqm/1e4).toFixed(1)} ha`;
    return `${Math.round(sqm)} m²`;
  }
  const sqft = sqm * 10.764;
  if (sqft >= 27878400) return `${(sqft/27878400).toFixed(2)} mi²`;
  if (sqft >= 43560)    return `${(sqft/43560).toFixed(1)} ac`;
  return `${Math.round(sqft)} ft²`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
updateUI();
updateStats();
window.addEventListener('resize', drawFog);
setTimeout(drawFog, 300);
</script>
</body>
</html>
